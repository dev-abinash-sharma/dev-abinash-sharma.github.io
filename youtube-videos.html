<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abinash Sharma | YouTube Videos</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" crossorigin href="./assets/main-C_yYovMB.css">

  <style>
    body {
      margin: 0;
    }

    .gallery-page {
      min-height: 100vh;
    }

    .gallery-shell {
      max-width: 1200px;
      margin: 0 auto;
    }

    .blog-buttons .btn {
      background: linear-gradient(135deg, #2506ad, #ff7b00);
    }

    .blog-buttons .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.35);
    }

    .blog-buttons .gallery-btn,
    .blog-buttons .youtube-btn {
      background: linear-gradient(135deg, #2506ad, #ff7b00);
    }

    .gallery-subtitle {
      max-width: 760px;
      margin: 1rem auto 0;
      font-size: 1.6rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.82);
    }

    .video-page-note {
      text-align: center;
      font-size: 1.6rem;
      color: rgba(255, 255, 255, 0.85);
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <section class="blog gallery-page">
    <div class="gallery-shell">
      <div class="blog-buttons">
        <a href="index.html#blog" class="btn hoverable">
          <i class="fas fa-arrow-left"></i>
          Home
        </a>
        <a href="blogs.html" class="btn hoverable">
          <i class="fas fa-arrow-right"></i>
          Blogs
        </a>
        <a href="travel-gallery.html" class="btn hoverable gallery-btn">
          <i class="fas fa-camera-retro"></i>
          Travel Gallery
        </a>
      </div>

      <h2 class="heading"><i class="fab fa-youtube"></i> My <span class="gradient-text">YouTube Videos</span></h2>
      <p class="gallery-subtitle">Turn the volume up on the journey, and let the screen carry the experience.</p>

      <div id="videoStatus" class="video-page-note">Loading videos...</div>
      <div id="youtubeVideos" class="video-grid"></div>
    </div>
  </section>

  <script>
    async function loadYoutubeVideos() {
      const status = document.getElementById("videoStatus");
      const container = document.getElementById("youtubeVideos");

      try {
        const response = await fetch("https://youtube-feed-api.abinasharma001.workers.dev");
        const videos = await response.json();

        if (!Array.isArray(videos) || videos.length === 0) {
          status.textContent = "No videos found.";
          return;
        }

        status.remove();
        container.innerHTML = videos.slice(0, 12).map(video => `
          <div class="video-card">
            <iframe
              src="https://www.youtube.com/embed/${video.id}"
              title="${video.title}"
              loading="lazy"
              allowfullscreen>
            </iframe>
            <h4>${video.title}</h4>
          </div>
        `).join("");
      } catch (error) {
        status.textContent = "Unable to load videos.";
        console.error(error);
      }
    }

    loadYoutubeVideos();
  </script>
</body>
</html>
