name: Update Credly Badges

on:
  schedule:
    - cron: "0 0 * * *"   # Daily at midnight UTC
  workflow_dispatch:

jobs:
  update-badges:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Credly public profile page
        run: |
          curl -L -A "Mozilla/5.0" -s https://www.credly.com/users/abinash-sharma.8f49b107 > page.html

      - name: Generate badges.json from embedded data
        run: |
          python <<EOF
          import json
          import re

          with open("page.html", "r", encoding="utf-8") as f:
              html = f.read()

          badges = []

          # Extract embedded JSON from page
          script_match = re.search(r'window\.__INITIAL_STATE__\s*=\s*(\{.*?\});', html, re.DOTALL)

          if script_match:
              try:
                  data = json.loads(script_match.group(1))

                  # Navigate possible badge structure safely
                  entities = data.get("entities", {})
                  badge_entities = entities.get("badges", {})

                  for badge_id, badge in badge_entities.items():
                      badges.append({
                          "name": badge.get("name"),
                          "image": badge.get("image_url"),
                          "url": badge.get("public_url")
                      })

              except Exception as e:
                  print("JSON parsing error:", e)

          # Write cleaned badges.json
          with open("assets/badges.json", "w") as f:
              json.dump(badges, f, indent=2)

          print("Badges extracted:", len(badges))
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/badges.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Credly badges"
          git push
