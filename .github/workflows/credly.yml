name: Update Credly Badges

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight UTC
  workflow_dispatch:

jobs:
  update-badges:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Credly public page
        run: |
          curl -L -s https://www.credly.com/users/abinash-sharma.8f49b107 > page.html

      - name: Install Python dependencies
        run: |
          pip install beautifulsoup4

      - name: Generate badges.json
        run: |
          python <<EOF
          import json
          from bs4 import BeautifulSoup

          with open("page.html", "r", encoding="utf-8") as f:
              soup = BeautifulSoup(f, "html.parser")

          badges = []

          for a in soup.find_all("a", href=True):
              if "/badges/" in a["href"]:
                  img = a.find("img")
                  if img and img.get("src"):
                      badges.append({
                          "name": img.get("alt", "Credly Badge"),
                          "image": img.get("src"),
                          "url": "https://www.credly.com" + a["href"]
                      })

          with open("assets/badges.json", "w") as f:
              json.dump(badges, f, indent=2)

          print("Badges JSON updated successfully.")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/badges.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Credly badges"
          git push
