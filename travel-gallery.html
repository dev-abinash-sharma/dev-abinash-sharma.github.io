<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abinash Sharma | Travel Gallery</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" crossorigin href="./assets/main-C_yYovMB.css">

  <style>
    body {
      margin: 0;
    }

    .gallery-page {
      min-height: 100vh;
    }

    .gallery-shell {
      max-width: 1200px;
      margin: 0 auto;
    }

    .blog-buttons .btn {
      background: linear-gradient(135deg, #2506ad, #ff7b00);
    }

    .blog-buttons .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.35);
    }

    .blog-buttons .gallery-btn,
    .blog-buttons .youtube-btn {
      background: linear-gradient(135deg, #2506ad, #ff7b00);
    }

    .gallery-subtitle {
      max-width: 760px;
      margin: 1rem auto 0;
      font-size: 1.6rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.82);
    }

    .travel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .travel-card {
      min-height: 220px;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      cursor: pointer;
    }

    .travel-card img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .travel-card:hover img {
      transform: scale(1.05);
    }

    .gallery-state {
      text-align: center;
      font-size: 1.6rem;
      padding: 2rem 0 0;
      color: #fff;
    }

    .image-lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(3, 2, 12, 0.88);
      z-index: 9999;
      padding: 24px;
    }

    .image-lightbox.active {
      display: flex;
    }

    .image-lightbox img {
      max-width: min(96vw, 1100px);
      max-height: 90vh;
      width: 100%;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      background: #111;
    }

    .image-lightbox .close-lightbox {
      position: absolute;
      top: 18px;
      right: 22px;
      font-size: 3.2rem;
      line-height: 1;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <section class="blog gallery-page">
    <div class="gallery-shell">
      <div class="blog-buttons">
        <a href="index.html#blog" class="btn hoverable">
          <i class="fas fa-arrow-left"></i>
          Home
        </a>
        <a href="blogs.html" class="btn hoverable">
          <i class="fas fa-arrow-right"></i>
          Blogs
        </a>
        <a href="youtube-videos.html" class="btn hoverable youtube-btn">
          <i class="fab fa-youtube"></i>
          YouTube Videos
        </a>
      </div>

      <h2 class="heading"><i class="fas fa-camera-retro"></i> Travel <span class="gradient-text">Gallery</span></h2>
      <p class="gallery-subtitle">Collect moments, not things, and let the pictures carry the story.</p>

      <div id="travelStatus" class="gallery-state">Loading images...</div>
      <div id="travelImages" class="travel-grid"></div>
    </div>
  </section>

  <div id="imageLightbox" class="image-lightbox" aria-hidden="true">
    <span class="close-lightbox" id="closeLightbox">&times;</span>
    <img id="lightboxImage" alt="Travel image preview">
  </div>

  <script>
    async function loadTravelImages() {
      const status = document.getElementById("travelStatus");
      const container = document.getElementById("travelImages");
      const lightbox = document.getElementById("imageLightbox");
      const lightboxImage = document.getElementById("lightboxImage");
      const closeLightbox = document.getElementById("closeLightbox");

      try {
        const response = await fetch("https://portfolio-gallery-api.abinasharma001.workers.dev");
        const images = await response.json();

        if (!Array.isArray(images) || images.length === 0) {
          status.textContent = "No travel images found.";
          return;
        }

        status.remove();
        container.innerHTML = images
          .map(img => `
            <div class="travel-card" data-full-image="${img.image || img.url || img.thumbnail}">
              <img src="${img.thumbnail}" alt="${img.title || 'Travel image'}">
            </div>
          `)
          .join("");

        container.querySelectorAll(".travel-card").forEach(card => {
          card.addEventListener("click", () => {
            const fullImage = card.dataset.fullImage;
            lightboxImage.src = fullImage;
            lightbox.classList.add("active");
            lightbox.setAttribute("aria-hidden", "false");
          });
        });

        closeLightbox.addEventListener("click", () => {
          lightbox.classList.remove("active");
          lightbox.setAttribute("aria-hidden", "true");
          lightboxImage.src = "";
        });

        lightbox.addEventListener("click", event => {
          if (event.target === lightbox) {
            lightbox.classList.remove("active");
            lightbox.setAttribute("aria-hidden", "true");
            lightboxImage.src = "";
          }
        });
      } catch (error) {
        status.textContent = "Unable to load images.";
        console.error(error);
      }
    }

    loadTravelImages();
  </script>
</body>
</html>
